name: NodeJS com Webpack e pnpm

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]  # Testar em diferentes versões do Node.js

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'  # Cache para dependências do pnpm

    - name: Instalar pnpm
      run: npm install -g pnpm  # Instalar pnpm globalmente

    - name: Instalar dependências
      run: pnpm install --no-frozen-lockfile  # Instalar dependências sem verificar o lockfile

    - name: Rodar testes
      run: pnpm test  # Executar testes, certifique-se de ter um script 'test' no seu package.json

    - name: Build do projeto
      run: pnpm run build  # Construir o projeto (certifique-se de ter um script 'build')

    - name: Compilar com Webpack
      run: npx webpack  # Compilação do projeto com Webpack

    - name: Publicar artefatos (Opcional)
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist  # Supondo que o Webpack gera a saída em "dist/"
        name: Test Action

on:
  - push
  - pull_request
  - workflow_dispatch

jobs:
  test_default_inputs:
    name: Test with default inputs

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        pnpm:
          - 9.15.5
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run the action
        uses: ./
        with:
          version: 9.15.5

      - name: 'Test: which'
        run: which pnpm; which pnpx

      - name: 'Test: install'
        run: pnpm install

  test_dest:
    name: Test with dest

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        pnpm:
          - 9.15.5
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run the action
        uses: ./
        with:
          version: 9.15.5
          dest: ~/test/pnpm

      - name: 'Test: which'
        run: which pnpm && which pnpx

      - name: 'Test: install'
        run: pnpm install

  test_standalone:
    name: Test with standalone

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

        standalone:
          - true
          - false

    steps:
      - uses: actions/checkout@v4

      - name: Run the action
        uses: ./
        with:
          version: 9.15.0
          standalone: ${{ matrix.standalone }}

      - name: install Node.js
        uses: actions/setup-node@v4
        with:
          # pnpm@7.0.0 is not compatible with Node.js 12
          node-version: 12.22.12

      - name: 'Test: which (pnpm)'
        run: which pnpm

      - name: 'Test: which (pnpx)'
        if: matrix.standalone == false
        run: which pnpx

      - name: 'Test: install when standalone is true'
        if: matrix.standalone
        run: pnpm add -g ngrok

      - name: 'Test: install when standalone is false'
        if: matrix.standalone == false
        # Since the default shell on windows runner is pwsh, we specify bash explicitly
        shell: bash
        run: |
          if pnpm install; then
            echo "pnpm install should fail"
            exit 1
          else
            echo "pnpm install failed as expected"
          fi

  test_run_install:
    name: 'Test with run_install (${{ matrix.run_install.name }}, ${{ matrix.os }})'

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        pnpm:
          - 9.15.5
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        run_install:
          - name: 'null'
            value: 'null'
          - name: 'empty object'
            value: '{}'
          - name: 'recursive'
            value: |
              recursive: true
          - name: 'global'
            value: |
              args:
                - --global
                - --global-dir=./pnpm-global
                - npm
                - yarn
          - name: 'array'
            value: |
              - {}
              - recursive: true
              - args:
                - --global
                - --global-dir=./pnpm-global
                - npm
                - yarn

    steps:
      - uses: actions/checkout@v4

      - name: Run the action
        uses: ./
        with:
          version: 9.15.5
          run_install: ${{ matrix.run_install.value }}

      - name: 'Test: which'
        run: which pnpm; which pnpx

      - name: 'Test: install'
        run: pnpm install
