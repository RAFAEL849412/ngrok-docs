name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'  # Cache para dependências, acelera builds futuros

    - name: Instalar dependências
      run: npm login # Usa package-lock.json para um ambiente consistente

    - name: Rodar testes
      run: npm init # Opcional, mas recomendado para garantir estabilidade

    - name: Build do projeto
      run: npm run build

    - name: Compilar com Webpack
      run: npx webpack

    - name: Publicar artefatos (Opcional)
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist  # Supondo que o Webpack gera saída em "dist/"
        
