name: NodeJS with Webpack and pnpm

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Instalar pnpm
      run: npm install -g pnpm

    - name: Instalar dependências (sem o frozen-lockfile)
      run: pnpm install --no-frozen-lockfile  # Usando --no-frozen-lockfile para evitar o erro

    - name: Rodar testes
      run: pnpm test  # Certifique-se de ter um script de teste no seu package.json

    - name: Build do projeto
      run: pnpm run build

    - name: Compilar com Webpack
      run: npx webpack

    - name: Publicar artefatos (Opcional)
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist  # Supondo que o Webpack gera saída em "dist/"
        name: Setup pnpm

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  setup-pnpm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '7.0.0'  # ou outra versão desejada

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test
