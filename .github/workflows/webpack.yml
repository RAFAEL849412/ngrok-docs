name: NodeJS com Webpack e pnpm

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]  # Testar em diferentes versões do Node.js

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'  # Cache para dependências do pnpm

    - name: Instalar pnpm
      run: npm install -g pnpm  # Instalar pnpm globalmente

    - name: Instalar dependências
      run: pnpm install --no-frozen-lockfile  # Instalar dependências sem verificar o lockfile

    - name: Rodar testes
      run: pnpm test  # Executar testes, certifique-se de ter um script 'test' no seu package.json

    - name: Build do projeto
      run: pnpm run build  # Construir o projeto (certifique-se de ter um script 'build')

    - name: Compilar com Webpack
      run: npx webpack  # Compilação do projeto com Webpack

    - name: Publicar artefatos (Opcional)
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist  # Supondo que o Webpack gera a saída em "dist/"
        
