name: NodeJS com Webpack e pnpm

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]  # Testar em diferentes versões do Node.js

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'  # Cache para dependências do pnpm

    - name: Instalar pnpm
      run: npm install -g pnpm  # Instalar pnpm globalmente

    - name: Instalar dependências
      run: pnpm install --no-frozen-lockfile  # Instalar dependências sem verificar o lockfile

    - name: Rodar testes
      run: pnpm test  # Executar testes, certifique-se de ter um script 'test' no seu package.json

    - name: Build do projeto
      run: pnpm run build  # Construir o projeto (certifique-se de ter um script 'build')

    - name: Compilar com Webpack
      run: npx webpack  # Compilação do projeto com Webpack

    - name: Publicar artefatos (Opcional)
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist  # Supondo que o Webpack gera a saída em "dist/"

  test:
    name: Test with different OS and pnpm versions

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        pnpm-version: [9.15.5]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Configurar pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ matrix.pnpm-version }}

    - name: 'Test: which pnpm'
      run: which pnpm

    - name: 'Test: install'
      run: pnpm install

    - name: 'Test: Run build'
      run: pnpm run build
      
